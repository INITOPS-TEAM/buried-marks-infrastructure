services:

  nginx:
    image: nginx:1.28.2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - map-service
      - login-front
      - map-front

  login-front:
    container_name: login-frontend-service
    build:
      context: ../buried-marks-frontend-microservice/services/login_front
      dockerfile: Dockerfile
    expose:
      - "8080"
    restart: always

  map-front:
    container_name: map-frontend-service
    build:
      context: ../buried-marks-frontend-microservice/services/map_front
      dockerfile: Dockerfile
    expose:
      - "8080"
    restart: always

  auth-db:
    image: postgres:18-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  auth-service:
    build:
      context: ../buried-marks-authentication-microservice
      dockerfile: Dockerfile
    env_file:
      - ../buried-marks-authentication-microservice/.env
    environment:
      DB_HOST: auth-db
    expose:
      - "8000"
    depends_on:
      -   auth-db

  map-service-db:
    container_name: buried-marks-map-service-db
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    image: mariadb:11.4-noble
    restart: always
    expose:
      - "3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5

  map-service:
    build:
      context: ../buried-marks-map-microservice
      dockerfile: Dockerfile
    env_file:
      - ../buried-marks-map-microservice/.env
    expose:
      - "9001"
    environment:
      DATABASE_HOST: map-service-db
    depends_on:
      map-service-db:
        condition: service_healthy

  valkey:
    image: valkey/valkey:9-alpine
    container_name: valkey_db
    volumes:
      - valkey_data:/data

  mail_service:
    build:
      context: ../buried-marks-mail-microservice
      dockerfile: Dockerfile
    container_name: mail_worker
    env_file:
      - ../buried-marks-mail-microservice/.env
    depends_on:
      - valkey

volumes:
  postgres_data:
  valkey_data:
